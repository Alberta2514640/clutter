AWSTemplateFormatVersion: "2010-09-09"
Description: IAM Role for Clutter Ansible Runner cross-account access

Parameters:
  AccountId:
    Type: String
    Description: AWS Account ID of the Clutter host account

  ExternalId:
    Type: String
    Description: A shared secret generated by Clutter to securely authorize cross-account role access for each client
    NoEcho: true

  UniqueId:
    Type: String
    Description: 8 character unique identifier to append to stack and role name

  ClutterS3Bucket:
    Type: String
    Description: Name of the Clutter S3 bucket used for Ansible SSM file staging and log storage

Resources:
  AnsibleRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AllowClutterToAnsibleRole-${UniqueId}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AccountId}:role/AnsibleRunnerFargateTaskRole"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId

      Policies:
        - PolicyName: AnsibleRunnerRequiredPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # ---------- EC2: describe and start/stop managed instances ----------
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: "*"
                Condition:
                  StringEquals:
                    ec2:ResourceTag/ManagedBy: Ansible

              # ---------- EC2: describe (read-only, no tag condition needed) ----------
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                Resource: "*"

              # ---------- SSM: start sessions on managed instances ----------
              - Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:*:${AWS::AccountId}:instance/*"
                Condition:
                  StringEquals:
                    ssm:resourceTag/ManagedBy: Ansible

              # ---------- SSM: start sessions on the default session document ----------
              - Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ssm:*::document/AWS-StartSSHSession"
                  - !Sub "arn:aws:ssm:*::document/SSM-SessionManagerRunShell"

              # ---------- SSM: terminate sessions ----------
              - Effect: Allow
                Action:
                  - ssm:TerminateSession
                  - ssm:ResumeSession
                Resource: "*"

              # ---------- S3: SSM file staging and Clutter log storage ----------
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                Resource: !Sub "arn:aws:s3:::${ClutterS3Bucket}"

              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${ClutterS3Bucket}/*"

Outputs:
  RoleArn:
    Value: !GetAtt AnsibleRunnerRole.Arn
