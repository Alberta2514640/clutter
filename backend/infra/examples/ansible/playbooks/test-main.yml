- name: Clutter Ansible transport smoke test
  hosts: all
  gather_facts: false
  tasks:
    - name: Write deterministic test marker
      ansible.builtin.copy:
        dest: /tmp/clutter-ansible-test.txt
        content: "clutter-ansible-ok\n"
        mode: "0644"

    - name: Read back the marker file
      ansible.builtin.command: cat /tmp/clutter-ansible-test.txt
      register: clutter_test_file
      changed_when: false

    - name: Surface the marker in task output
      ansible.builtin.debug:
        msg: "{{ clutter_test_file.stdout }}"
